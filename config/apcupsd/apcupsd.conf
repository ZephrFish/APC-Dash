## apcupsd.conf v1.1 ##
#
# Configuration for APC Back-UPS ES 850G2
#

# UPS name for reporting
UPSNAME BackUPS850

# Cable and UPS type (USB)
UPSCABLE usb
UPSTYPE usb
DEVICE /dev/usb/hiddev0

# Shutdown thresholds
BATTERYLEVEL 15
MINUTES 5
TIMEOUT 0

# Notification timing
ANNOY 300
ANNOYDELAY 60
NOLOGON disable

# Network Information Server (allows remote monitoring)
NETSERVER on
NISIP 0.0.0.0
NISPORT 3551

# Power events
ONBATTERYDELAY 6

# Scripts directory
SCRIPTDIR /etc/apcupsd
PWRFAILDIR /etc/apcupsd
NOLOGINDIR /etc

# Lock file
LOCKFILE /var/lock

# Event logging
EVENTSFILE /var/log/apcupsd.events
EVENTSFILEMAX 10

# Required by Debian - mark as configured
