## apcupsd.conf v1.1 ##
#
# Configuration for second APC UPS (serial 9B2520A08811)
#

# UPS name for reporting
UPSNAME BackUPS2

# Cable and UPS type (USB)
UPSCABLE usb
UPSTYPE usb
DEVICE /dev/usb/hiddev1

# Shutdown thresholds
BATTERYLEVEL 15
MINUTES 5
TIMEOUT 0

# Notification timing
ANNOY 300
ANNOYDELAY 60
NOLOGON disable

# Network Information Server (allows remote monitoring)
NETSERVER on
NISIP 0.0.0.0
NISPORT 3552

# Power events
ONBATTERYDELAY 6

# Scripts directory
SCRIPTDIR /etc/apcupsd2
PWRFAILDIR /etc/apcupsd2
NOLOGINDIR /etc

# Lock file
LOCKFILE /var/lock

# Event logging
EVENTSFILE /var/log/apcupsd2.events
EVENTSFILEMAX 10
