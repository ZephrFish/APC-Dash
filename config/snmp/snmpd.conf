# SNMPd Configuration for UPS SNMP Server
agentAddress udp:161,udp6:[::1]:161

# Community strings (CHANGE THESE FOR PRODUCTION!)
rocommunity REDACTED
rwcommunity REDACTED

# System info
sysLocation Server Room
sysContact admin@example.com
sysName UPS-SNMP-Server

# Pass APC UPS OID trees to shell scripts
# UPS 1 (Back-UPS ES 850G2) - standard APC OID .318.1.1.1
pass .1.3.6.1.4.1.318.1.1.1 /bin/sh /etc/snmp/apcupsd.sh
# UPS 2 (Back-UPS BE1050G2) - custom OID .318.1.1.2
pass .1.3.6.1.4.1.318.1.1.2 /bin/sh /etc/snmp/apcupsd2.sh

master agentx
dontLogTCPWrappersConnects yes
